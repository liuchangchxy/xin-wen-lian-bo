name: Update today xin wen lian bo

on:
  workflow_dispatch:
  schedule:
    # 东八区 20:30 (UTC+8 = UTC 12:30), 联播结束后抓取
    - cron: '30 12 * * *'

permissions:
  contents: write

jobs:
  update:
    name: Update today xin wen lian bo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run index
      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/5a50b802-7130-4859-96e6-4a1eff848ee7
        run: |
          FILE="news/$(date +%Y%m%d).md"
          test -f "$FILE" || { echo "No news file today"; exit 0; }
          python3 << 'PYEOF'
          import json, re, urllib.request, os
          from datetime import date
          
          with open(os.environ.get("FILE", "news/" + date.today().strftime("%Y%m%d") + ".md")) as f:
              md = f.read()
          
          # Convert headers to bold (Feishu card md doesn't support #)
          md = re.sub(r'^#{1,6}\s+(.+)$', r'**\1**', md, flags=re.MULTILINE)
          # Remove [查看原文](url) lines - keep just the link
          # Feishu card md supports [text](url) natively
          
          # Feishu card content limit ~30KB, truncate if needed
          if len(md.encode()) > 28000:
              md = md[:14000] + "\n\n...(内容过长，已截断)"
          
          card = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {"tag": "plain_text", "content": "📺 新闻联播 " + date.today().strftime("%Y-%m-%d")},
                      "template": "blue"
                  },
                  "elements": [{"tag": "markdown", "content": md}]
              }
          }
          req = urllib.request.Request(
              os.environ["FEISHU_WEBHOOK"],
              data=json.dumps(card, ensure_ascii=False).encode(),
              headers={"Content-Type": "application/json"}
          )
          resp = urllib.request.urlopen(req)
          print(resp.read().decode())
          PYEOF
      - run: git config --local user.email "github-actions[bot]@github.com"
      - run: git config --local user.name "github-actions[bot]"
      - run: git add .
      - run: git diff --cached --quiet || git commit -m "AUTO UPDATE [bot]"
      - run: git push origin master
